; PlatformIO Project Configuration
; Smart Home Security System - ESP32
; Uses ThingSpeak + Firebase (NO Blynk)

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Libraries needed (no Blynk)
lib_deps =
    miguelbalboa/MFRC522@^1.4.10
    arduino-libraries/Servo@^1.1.8

; Build flags
build_flags = 
    -DARDUINO_ESP32_DEV
    -DCORE_DEBUG_LEVEL=0

; Monitor filters
monitor_filters = 
    esp32_exception_decoder
    direct

; Upload port (change to your ESP32 COM port)
upload_port = COM3